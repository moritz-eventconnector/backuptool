<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="auth-header" content="{{.AuthHeader}}" />
  <title>Licenser — backuptool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --card:     #1e293b;
      --border:   #334155;
      --primary:  #6366f1;
      --primary-h:#818cf8;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --success:  #22c55e;
      --warning:  #f59e0b;
      --danger:   #ef4444;
      --radius:   8px;
      --sidebar:  180px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Layout ── */
    #app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar);
      min-width: var(--sidebar);
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow-y: auto;
    }

    .sidebar-brand {
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-brand h1 {
      font-size: 15px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.3px;
    }

    .sidebar-brand p {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    nav {
      flex: 1;
      padding: 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    nav a {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }

    nav a svg { flex-shrink: 0; }

    nav a:hover {
      background: rgba(99,102,241,0.08);
      color: var(--text);
    }

    nav a.active {
      background: rgba(99,102,241,0.15);
      color: var(--primary);
    }

    .sidebar-footer {
      padding: 12px 10px;
      border-top: 1px solid var(--border);
    }

    .pubkey-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
    }

    .pubkey-box label {
      display: block;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 5px;
      line-height: 1.3;
    }

    .pubkey-value {
      font-family: monospace;
      font-size: 10px;
      color: var(--primary-h);
      word-break: break-all;
      margin-bottom: 6px;
      min-height: 28px;
    }

    /* ── Main content ── */
    #main {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
    }

    /* ── Page header ── */
    .page-header {
      margin-bottom: 24px;
    }

    .page-header h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .page-header p {
      color: var(--muted);
      font-size: 13px;
      margin-top: 3px;
    }

    /* ── Stat cards ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }

    .stat-card .label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-card.total   .value { color: var(--text); }
    .stat-card.active  .value { color: var(--success); }
    .stat-card.expiring .value { color: var(--warning); }
    .stat-card.revoked .value { color: var(--danger); }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 20px;
    }

    .card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-header h3 {
      font-size: 14px;
      font-weight: 600;
    }

    .card-body {
      padding: 20px;
    }

    /* ── Tables ── */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid rgba(51,65,85,0.5);
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(99,102,241,0.04); }

    tbody td {
      padding: 11px 14px;
      vertical-align: middle;
    }

    .mono {
      font-family: monospace;
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .badge-active   { background: rgba(34,197,94,0.15);  color: #4ade80; }
    .badge-expiring { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .badge-expired  { background: rgba(239,68,68,0.12);  color: #f87171; }
    .badge-revoked  { background: rgba(100,116,139,0.2); color: var(--muted); }

    .badge-edition-community  { background: rgba(99,102,241,0.12); color: #a5b4fc; }
    .badge-edition-pro        { background: rgba(34,197,94,0.12);  color: #86efac; }
    .badge-edition-enterprise { background: rgba(245,158,11,0.12); color: #fcd34d; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.15s, background 0.15s;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) { background: var(--primary-h); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover:not(:disabled) {
      color: var(--text);
      background: rgba(255,255,255,0.04);
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(239,68,68,0.3);
    }

    .btn-danger:hover:not(:disabled) {
      background: rgba(239,68,68,0.08);
    }

    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* ── Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    label .req { color: var(--danger); margin-left: 2px; }

    input[type="text"],
    input[type="number"],
    input[type="date"],
    select,
    textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      width: 100%;
      transition: border-color 0.15s;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
    }

    textarea { resize: vertical; min-height: 70px; }

    select option { background: var(--card); }

    .hint { font-size: 11px; color: var(--muted); }

    /* ── Search ── */
    .search-bar {
      position: relative;
      margin-bottom: 16px;
    }

    .search-bar input {
      padding-left: 34px;
    }

    .search-bar svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    /* ── Code box ── */
    .code-box {
      background: #0a0d14;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-family: monospace;
      font-size: 12px;
      color: #a5b4fc;
      word-break: break-all;
      line-height: 1.6;
      position: relative;
    }

    .code-box .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
    }

    /* ── Result panel ── */
    .result-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-top: 20px;
    }

    .result-panel h4 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 14px;
      color: var(--success);
    }

    .result-panel.error h4 { color: var(--danger); }

    .claims-table { margin-top: 14px; }
    .claims-table tr td:first-child {
      color: var(--muted);
      font-size: 12px;
      padding-right: 16px;
      white-space: nowrap;
      width: 140px;
    }

    .claims-table tr td:last-child {
      font-family: monospace;
      font-size: 12px;
    }

    .claims-table tr td { padding: 4px 0; }

    /* ── Toast ── */
    #toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 9999;
    }

    .toast {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 16px;
      font-size: 13px;
      color: var(--text);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      animation: slideIn 0.2s ease;
      max-width: 280px;
    }

    .toast.success { border-left: 3px solid var(--success); }
    .toast.error   { border-left: 3px solid var(--danger); }
    .toast.info    { border-left: 3px solid var(--primary); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty-state svg { margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 13px; }

    /* ── Valid/Invalid badge (verify) ── */
    .verify-result-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: var(--radius);
      margin-bottom: 16px;
    }

    .verify-result-badge.valid   { background: rgba(34,197,94,0.1);  color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .verify-result-badge.invalid { background: rgba(239,68,68,0.1);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

    /* ── Summary mini-table ── */
    .summary-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 12px;
    }

    .summary-table td {
      padding: 6px 10px;
      border-bottom: 1px solid rgba(51,65,85,0.4);
    }

    .summary-table td:first-child {
      color: var(--muted);
      width: 140px;
      font-size: 12px;
    }

    /* ── Responsive tweaks ── */
    @media (max-width: 900px) {
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      #main { padding: 16px; }
      .form-grid { grid-template-columns: 1fr; }
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<div id="app">
  <!-- ── Sidebar ── -->
  <aside id="sidebar">
    <div class="sidebar-brand">
      <h1>Licenser</h1>
      <p>backuptool</p>
    </div>
    <nav id="nav">
      <a href="#dashboard" data-page="dashboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="#licenses" data-page="licenses">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2H3v16h5v4l4-4 4 4v-4h5V2z"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/></svg>
        Licenses
      </a>
      <a href="#generate" data-page="generate">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Generate
      </a>
      <a href="#verify" data-page="verify">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
        Verify
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="pubkey-box">
        <label>Public Key (base64url)<br>Embed in verifier → LICENSE_PUBLIC_KEY</label>
        <div class="pubkey-value mono" id="pub-key-display">loading…</div>
        <button class="btn btn-ghost btn-sm" onclick="copyPubKey()">Copy</button>
      </div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main id="main">
    <div id="page-dashboard"></div>
    <div id="page-licenses" style="display:none"></div>
    <div id="page-generate" style="display:none"></div>
    <div id="page-verify" style="display:none"></div>
  </main>
</div>

<div id="toast-container"></div>

<script>
// ────────────────────────────────────────────────────────────
// Auth
// ────────────────────────────────────────────────────────────
const AUTH_HEADER = document.querySelector('meta[name="auth-header"]').content;

// ────────────────────────────────────────────────────────────
// API
// ────────────────────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const headers = {
    'Authorization': 'Basic ' + AUTH_HEADER,
    ...(opts.headers || {}),
  };
  if (opts.body && typeof opts.body === 'object') {
    headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.body);
  }
  const res = await fetch(path, { ...opts, headers });
  const ct = res.headers.get('content-type') || '';
  const data = ct.includes('json') ? await res.json() : await res.text();
  if (!res.ok) {
    throw new Error((data && data.error) || `HTTP ${res.status}`);
  }
  return data;
}

// ────────────────────────────────────────────────────────────
// Toast
// ────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ────────────────────────────────────────────────────────────
// Routing
// ────────────────────────────────────────────────────────────
const PAGES = ['dashboard', 'licenses', 'generate', 'verify'];

function navigate(hash) {
  const page = (hash || '').replace('#', '') || 'dashboard';
  const target = PAGES.includes(page) ? page : 'dashboard';

  PAGES.forEach(p => {
    document.getElementById('page-' + p).style.display = p === target ? '' : 'none';
  });

  document.querySelectorAll('nav a').forEach(a => {
    a.classList.toggle('active', a.dataset.page === target);
  });

  window.location.hash = target;
  renderPage(target);
}

window.addEventListener('hashchange', () => navigate(window.location.hash));

// ────────────────────────────────────────────────────────────
// Helpers
// ────────────────────────────────────────────────────────────
function statusBadge(rec) {
  if (rec.revoked) return '<span class="badge badge-revoked">Revoked</span>';
  if (!rec.expiresAt) return '<span class="badge badge-active">Active</span>';
  const exp = new Date(rec.expiresAt);
  const now = new Date();
  if (exp < now) return '<span class="badge badge-expired">Expired</span>';
  const days = (exp - now) / 86400000;
  if (days <= 30) return '<span class="badge badge-expiring">Expiring</span>';
  return '<span class="badge badge-active">Active</span>';
}

function editionBadge(ed) {
  return `<span class="badge badge-edition-${ed}">${ed}</span>`;
}

function fmtDate(s) {
  if (!s) return '<span class="muted">—</span>';
  try { return new Date(s).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }); }
  catch { return s; }
}

function truncate(s, n = 18) {
  if (!s) return '<span style="color:var(--muted)">none</span>';
  return s.length > n ? `<span title="${escHtml(s)}">${escHtml(s.slice(0, n))}…</span>` : escHtml(s);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ────────────────────────────────────────────────────────────
// Public key
// ────────────────────────────────────────────────────────────
let cachedPubKey = '';

async function loadPubKey() {
  try {
    const data = await apiFetch('/api/status');
    cachedPubKey = data.publicKeyB64 || '';
    document.getElementById('pub-key-display').textContent = cachedPubKey || '(unavailable)';
    return data;
  } catch(e) {
    document.getElementById('pub-key-display').textContent = '(error)';
    return null;
  }
}

function copyPubKey() {
  if (!cachedPubKey) return;
  navigator.clipboard.writeText(cachedPubKey).then(() => toast('Public key copied!', 'success'));
}

// ────────────────────────────────────────────────────────────
// Dashboard
// ────────────────────────────────────────────────────────────
async function renderDashboard() {
  const el = document.getElementById('page-dashboard');
  el.innerHTML = `
    <div class="page-header">
      <h2>Dashboard</h2>
      <p>Overview of all issued licenses</p>
    </div>
    <div class="stat-grid">
      <div class="stat-card total"><div class="label">Total</div><div class="value" id="stat-total">—</div></div>
      <div class="stat-card active"><div class="label">Active</div><div class="value" id="stat-active">—</div></div>
      <div class="stat-card expiring"><div class="label">Expiring Soon</div><div class="value" id="stat-expiring">—</div></div>
      <div class="stat-card revoked"><div class="label">Revoked</div><div class="value" id="stat-revoked">—</div></div>
    </div>
    <div class="card">
      <div class="card-header"><h3>Recent Licenses</h3></div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Customer</th><th>Edition</th><th>Seats</th><th>Fingerprint</th><th>Expiry</th><th>Status</th>
          </tr></thead>
          <tbody id="recent-tbody"><tr><td colspan="6" style="text-align:center;padding:20px;color:var(--muted)">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>`;

  try {
    const [statusData, licenses] = await Promise.all([loadPubKey(), apiFetch('/api/licenses')]);
    if (statusData) {
      const s = statusData.stats || {};
      document.getElementById('stat-total').textContent    = s.total    ?? 0;
      document.getElementById('stat-active').textContent   = s.active   ?? 0;
      document.getElementById('stat-expiring').textContent = s.expiringSoon ?? 0;
      document.getElementById('stat-revoked').textContent  = s.revoked  ?? 0;
    }
    const recent = (licenses || []).slice(0, 5);
    const tbody = document.getElementById('recent-tbody');
    if (!recent.length) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 2H3v16h5v4l4-4 4 4v-4h5V2z"/></svg>
        <p>No licenses yet. <a href="#generate" onclick="navigate('generate')">Generate one</a>.</p>
      </div></td></tr>`;
    } else {
      tbody.innerHTML = recent.map(r => `
        <tr>
          <td><strong>${escHtml(r.customerName || r.customerId || '—')}</strong><br><span class="mono">${escHtml(r.customerId || '')}</span></td>
          <td>${editionBadge(r.edition)}</td>
          <td>${r.seats}</td>
          <td class="mono">${truncate(r.fingerprint, 20)}</td>
          <td>${fmtDate(r.expiresAt)}</td>
          <td>${statusBadge(r)}</td>
        </tr>`).join('');
    }
  } catch(e) {
    toast('Failed to load dashboard: ' + e.message, 'error');
  }
}

// ────────────────────────────────────────────────────────────
// Licenses
// ────────────────────────────────────────────────────────────
let allLicenses = [];
let licenseSearchQuery = '';

async function renderLicenses() {
  const el = document.getElementById('page-licenses');
  el.innerHTML = `
    <div class="page-header">
      <h2>Licenses</h2>
      <p>All issued licenses</p>
    </div>
    <div class="search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="license-search" placeholder="Search by customer name or ID…" value="${escHtml(licenseSearchQuery)}" oninput="filterLicenses(this.value)" />
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Customer</th><th>Edition</th><th>Seats</th><th>Fingerprint</th><th>Expiry</th><th>Status</th><th>Created</th><th>Actions</th>
          </tr></thead>
          <tbody id="licenses-tbody"><tr><td colspan="8" style="text-align:center;padding:20px;color:var(--muted)">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>`;

  try {
    allLicenses = await apiFetch('/api/licenses');
    renderLicensesTable(allLicenses);
  } catch(e) {
    toast('Failed to load licenses: ' + e.message, 'error');
  }
}

function filterLicenses(q) {
  licenseSearchQuery = q;
  const lq = q.toLowerCase();
  const filtered = allLicenses.filter(r =>
    (r.customerName || '').toLowerCase().includes(lq) ||
    (r.customerId || '').toLowerCase().includes(lq)
  );
  renderLicensesTable(filtered);
}

function renderLicensesTable(recs) {
  const tbody = document.getElementById('licenses-tbody');
  if (!tbody) return;
  if (!recs || !recs.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p>No licenses found.</p>
    </div></td></tr>`;
    return;
  }
  tbody.innerHTML = recs.map(r => `
    <tr>
      <td>
        <strong>${escHtml(r.customerName || '—')}</strong>
        <br><span class="mono">${escHtml(r.customerId || '—')}</span>
      </td>
      <td>${editionBadge(r.edition)}</td>
      <td>${r.seats}</td>
      <td class="mono">${truncate(r.fingerprint, 22)}</td>
      <td>${fmtDate(r.expiresAt)}</td>
      <td>${statusBadge(r)}</td>
      <td class="mono">${fmtDate(r.createdAt)}</td>
      <td>
        <button class="btn btn-ghost btn-sm" onclick="copyJWT('${escHtml(r.id)}')">Copy JWT</button>
        ${!r.revoked ? `<button class="btn btn-danger btn-sm" style="margin-left:4px" onclick="revokeConfirm('${escHtml(r.id)}', '${escHtml(r.customerName || r.customerId || r.id)}')">Revoke</button>` : ''}
      </td>
    </tr>`).join('');
}

async function copyJWT(id) {
  try {
    const rec = await apiFetch('/api/licenses/' + id);
    if (!rec.rawJwt) throw new Error('No JWT in response');
    await navigator.clipboard.writeText(rec.rawJwt);
    toast('JWT copied to clipboard!', 'success');
  } catch(e) {
    toast('Failed to copy JWT: ' + e.message, 'error');
  }
}

async function revokeConfirm(id, name) {
  if (!confirm(`Revoke license for "${name}"?\n\nThis cannot be undone.`)) return;
  try {
    await apiFetch('/api/licenses/' + id, { method: 'DELETE' });
    toast('License revoked.', 'info');
    allLicenses = await apiFetch('/api/licenses');
    filterLicenses(licenseSearchQuery);
  } catch(e) {
    toast('Failed to revoke: ' + e.message, 'error');
  }
}

// ────────────────────────────────────────────────────────────
// Generate
// ────────────────────────────────────────────────────────────
function renderGenerate() {
  const el = document.getElementById('page-generate');
  el.innerHTML = `
    <div class="page-header">
      <h2>Generate License</h2>
      <p>Create a new signed Ed25519 license JWT</p>
    </div>
    <div class="card">
      <div class="card-body">
        <form id="gen-form" onsubmit="submitGenerate(event)">
          <div class="form-grid">
            <div class="form-group">
              <label for="gen-cid">Customer ID<span class="req">*</span></label>
              <input type="text" id="gen-cid" required placeholder="acme-corp" />
            </div>
            <div class="form-group">
              <label for="gen-cname">Customer Name</label>
              <input type="text" id="gen-cname" placeholder="Acme Corporation" />
            </div>
            <div class="form-group">
              <label for="gen-edition">Edition</label>
              <select id="gen-edition">
                <option value="community">Community</option>
                <option value="pro" selected>Pro</option>
                <option value="enterprise">Enterprise</option>
              </select>
            </div>
            <div class="form-group">
              <label for="gen-seats">Seats</label>
              <input type="number" id="gen-seats" value="5" min="1" max="99999" />
            </div>
            <div class="form-group">
              <label for="gen-expiry">Expiry Date</label>
              <input type="date" id="gen-expiry" />
              <span class="hint">Leave empty for a perpetual license</span>
            </div>
            <div class="form-group">
              <label for="gen-features">Features</label>
              <input type="text" id="gen-features" placeholder="sso,audit_log,k8s_agent" />
              <span class="hint">Comma-separated feature list</span>
            </div>
            <div class="form-group full">
              <label for="gen-fp">Fingerprint</label>
              <input type="text" id="gen-fp" placeholder="sha256:abc123… (from backuptool License page)" />
            </div>
            <div class="form-group full">
              <label for="gen-notes">Notes</label>
              <textarea id="gen-notes" placeholder="Internal notes (not embedded in license)"></textarea>
            </div>
          </div>
          <div style="margin-top:20px;display:flex;gap:10px;align-items:center">
            <button type="submit" class="btn btn-primary" id="gen-submit">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
              Generate License
            </button>
          </div>
        </form>
      </div>
    </div>
    <div id="gen-result"></div>`;
}

async function submitGenerate(e) {
  e.preventDefault();
  const btn = document.getElementById('gen-submit');
  btn.disabled = true;
  btn.textContent = 'Generating…';

  const featuresRaw = document.getElementById('gen-features').value.trim();
  const features = featuresRaw
    ? featuresRaw.split(',').map(f => f.trim()).filter(Boolean)
    : [];

  const body = {
    customerId:   document.getElementById('gen-cid').value.trim(),
    customerName: document.getElementById('gen-cname').value.trim(),
    edition:      document.getElementById('gen-edition').value,
    seats:        parseInt(document.getElementById('gen-seats').value) || 5,
    features,
    expiry:       document.getElementById('gen-expiry').value || '',
    fingerprint:  document.getElementById('gen-fp').value.trim(),
    notes:        document.getElementById('gen-notes').value.trim(),
  };

  try {
    const rec = await apiFetch('/api/licenses', { method: 'POST', body });
    showGenerateResult(rec);
    toast('License generated!', 'success');
    // Reset form
    document.getElementById('gen-form').reset();
    document.getElementById('gen-edition').value = 'pro';
    document.getElementById('gen-seats').value = '5';
  } catch(e) {
    document.getElementById('gen-result').innerHTML = `
      <div class="result-panel error">
        <h4>Generation failed</h4>
        <p style="color:var(--danger)">${escHtml(e.message)}</p>
      </div>`;
    toast('Error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> Generate License`;
  }
}

function showGenerateResult(rec) {
  const el = document.getElementById('gen-result');
  const jwt = rec.rawJwt || '';
  el.innerHTML = `
    <div class="result-panel">
      <h4>License Generated Successfully</h4>
      <table class="summary-table">
        <tr><td>ID</td><td class="mono">${escHtml(rec.id)}</td></tr>
        <tr><td>Customer</td><td>${escHtml(rec.customerName || '—')} <span class="mono">(${escHtml(rec.customerId || '—')})</span></td></tr>
        <tr><td>Edition</td><td>${editionBadge(rec.edition)}</td></tr>
        <tr><td>Seats</td><td>${rec.seats}</td></tr>
        <tr><td>Expires</td><td>${rec.expiresAt ? fmtDate(rec.expiresAt) : '<em>Perpetual</em>'}</td></tr>
        ${rec.fingerprint ? `<tr><td>Fingerprint</td><td class="mono">${escHtml(rec.fingerprint)}</td></tr>` : ''}
        ${rec.features && rec.features.length ? `<tr><td>Features</td><td class="mono">${escHtml(rec.features.join(', '))}</td></tr>` : ''}
      </table>
      <div style="margin-top:16px">
        <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px">License JWT</div>
        <div class="code-box">
          <div id="gen-jwt-text" style="padding-right:70px">${escHtml(jwt)}</div>
          <button class="btn btn-ghost btn-sm copy-btn" onclick="copyGenJWT()">Copy</button>
        </div>
      </div>
    </div>`;
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  window._lastGenJWT = jwt;
}

function copyGenJWT() {
  if (!window._lastGenJWT) return;
  navigator.clipboard.writeText(window._lastGenJWT).then(() => toast('JWT copied!', 'success'));
}

// ────────────────────────────────────────────────────────────
// Verify
// ────────────────────────────────────────────────────────────
function renderVerify() {
  const el = document.getElementById('page-verify');
  el.innerHTML = `
    <div class="page-header">
      <h2>Verify License</h2>
      <p>Validate a license JWT and inspect its claims</p>
    </div>
    <div class="card">
      <div class="card-body">
        <div class="form-group">
          <label for="verify-jwt">License JWT</label>
          <textarea id="verify-jwt" style="min-height:120px;font-family:monospace;font-size:12px" placeholder="Paste the license JWT here…"></textarea>
        </div>
        <div style="margin-top:14px">
          <button class="btn btn-primary" id="verify-btn" onclick="submitVerify()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
            Verify License
          </button>
        </div>
      </div>
    </div>
    <div id="verify-result"></div>`;
}

async function submitVerify() {
  const jwt = document.getElementById('verify-jwt').value.trim();
  if (!jwt) { toast('Please paste a JWT first.', 'error'); return; }

  const btn = document.getElementById('verify-btn');
  btn.disabled = true;
  btn.textContent = 'Verifying…';

  try {
    const data = await apiFetch('/api/verify', { method: 'POST', body: { jwt } });
    showVerifyResult(data);
  } catch(e) {
    document.getElementById('verify-result').innerHTML = `
      <div class="result-panel error"><h4>Verification Error</h4><p style="color:var(--danger)">${escHtml(e.message)}</p></div>`;
    toast('Verification error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg> Verify License`;
  }
}

function showVerifyResult(data) {
  const el = document.getElementById('verify-result');
  if (!data.valid) {
    el.innerHTML = `
      <div class="result-panel error">
        <div class="verify-result-badge invalid">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          Invalid
        </div>
        <p style="color:var(--danger);font-size:13px">${escHtml(data.error || 'License is invalid')}</p>
      </div>`;
    return;
  }

  const c = data.claims || {};
  const rows = [
    ['Subject (Customer ID)', c.sub || '—'],
    ['Customer Name', c.customerName || '—'],
    ['Edition', c.edition || '—'],
    ['Seats', c.seats != null ? c.seats : '—'],
    ['Features', (c.features && c.features.length) ? c.features.join(', ') : '(none)'],
    ['Issuer', c.iss || '—'],
    ['Issued At', c.iat ? fmtDate(new Date(c.iat * 1000).toISOString()) : '—'],
    ['Expires At', c.exp ? fmtDate(new Date(c.exp * 1000).toISOString()) : 'Perpetual'],
    ['Fingerprint', c.fingerprint || '(none)'],
  ];

  el.innerHTML = `
    <div class="result-panel">
      <div class="verify-result-badge valid">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
        Valid
      </div>
      <table class="claims-table">
        ${rows.map(([k,v]) => `<tr><td>${escHtml(k)}</td><td>${escHtml(String(v))}</td></tr>`).join('')}
      </table>
    </div>`;
}

// ────────────────────────────────────────────────────────────
// Page dispatcher
// ────────────────────────────────────────────────────────────
function renderPage(page) {
  switch(page) {
    case 'dashboard': renderDashboard(); break;
    case 'licenses':  renderLicenses();  break;
    case 'generate':  renderGenerate();  break;
    case 'verify':    renderVerify();    break;
  }
}

// ────────────────────────────────────────────────────────────
// Boot
// ────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  navigate(window.location.hash || '#dashboard');
});
</script>
</body>
</html>
