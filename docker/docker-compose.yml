version: "3.9"

# =============================================================================
# backuptool — docker-compose
#
# Quick start (HTTP, no proxy):
#   1. cp .env.example .env   # set MASTER_SECRET
#   2. docker compose up -d
#   3. Open http://localhost:3000
#
# With Caddy reverse proxy + SSL (Let's Encrypt or custom cert):
#   docker compose --profile proxy up -d
#   Then configure domain & SSL in Settings -> Proxy / SSL (no restart needed).
#
# Dev mode (adds a local agent for testing):
#   docker compose --profile dev up -d
#
# Profiles can be combined:
#   docker compose --profile proxy --profile dev up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # server -- REST API + web UI
  # ---------------------------------------------------------------------------
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    image: backuptool-server:local
    restart: unless-stopped
    ports:
      # Without the proxy profile this is the only port exposed.
      # With the proxy profile you can set EXPOSE_PORT="" to keep 3000 internal.
      - "${EXPOSE_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATA_DIR: /data
      # REQUIRED -- generate with: openssl rand -hex 32
      MASTER_SECRET: "${MASTER_SECRET}"
      # Set to your public URL when using the proxy (e.g. https://backup.example.com)
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:3000}"
      LICENSE_PUBLIC_KEY: "${LICENSE_PUBLIC_KEY:-}"
    volumes:
      - backuptool-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # caddy -- reverse proxy with automatic SSL
  #
  # Activate with:  docker compose --profile proxy up -d
  #
  # * Automatically obtains & renews Let's Encrypt certificates
  # * Supports custom PEM certificates uploaded via the UI
  # * IP allowlisting (CIDR ranges) configured via Settings -> Proxy / SSL
  # * Caddy runs with --watch: picks up Caddyfile changes without a restart
  # ---------------------------------------------------------------------------
  caddy:
    profiles: ["proxy"]
    build:
      context: .
      dockerfile: Dockerfile.caddy
    image: backuptool-caddy:local
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      # Shared app data volume -- server writes /data/caddy/Caddyfile, Caddy reads it
      - backuptool-data:/data
      # Caddy persists ACME state & TLS keys here (survives container restarts)
      - caddy-config:/config
    environment:
      XDG_DATA_HOME: /data/caddy/xdg

  # ---------------------------------------------------------------------------
  # agent -- local testing only (docker compose --profile dev up)
  # ---------------------------------------------------------------------------
  agent:
    profiles: ["dev"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    image: backuptool-agent:local
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      SERVER_URL: "${AGENT_SERVER_URL:-http://server:3000}"
      AGENT_TOKEN: "${AGENT_TOKEN:-}"
      AGENT_NAME: "${AGENT_NAME:-local-agent}"

# =============================================================================
# Named volumes
# =============================================================================
volumes:
  backuptool-data:
    driver: local
  caddy-config:
    driver: local
